<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Mario – Goose Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    margin: 0;
    overflow: hidden;
    background: skyblue;
    touch-action: none;
  }
  canvas { display: block; }
  .controls {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 120px;
    background: linear-gradient(orange, red);
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: white;
    font-size: 40px;
    border: none;
    touch-action: none;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
  <button class="btn" id="left">⬅️</button>
  <button class="btn" id="jump">⬆️</button>
  <button class="btn" id="right">➡️</button>
</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

canvas.width = innerWidth;
canvas.height = innerHeight - 120;

// LOAD MARIO SPRITE
const marioImg = new Image();
marioImg.src = '2577.png'; // Ensure the image file is in the same folder

let cameraX = 0;
let score = 0;

const player = { x:100, y:200, r:20, vx:0, vy:0, onGround:false };
const gravity = 0.6;
const ground = { x:0, y:canvas.height-40, w:5000, h:40 };

const platformOffset = isMobile ? 80 : 0;
const platforms = [
  {x:300, y:300+platformOffset, w:120, h:20},
  {x:600, y:260+platformOffset, w:120, h:20},
  {x:900, y:220+platformOffset, w:120, h:20},
  {x:1400,y:260+platformOffset,w:120,h:20}
];

let enemies = [
  {x:500,y:canvas.height-55,r:15,dir:1,alive:true},
  {x:1100,y:canvas.height-55,r:15,dir:-1,alive:true}
];

let coins = [
  {x:320,y:260+platformOffset,collected:false},
  {x:620,y:220+platformOffset,collected:false},
  {x:920,y:180+platformOffset,collected:false},
  {x:1450,y:220+platformOffset,collected:false}
];

const flag = { x:1800, y:canvas.height-200, w:20, h:160 };

let keys = {};
addEventListener("keydown", e => keys[e.key]=true);
addEventListener("keyup", e => keys[e.key]=false);

document.getElementById('left').ontouchstart = () => keys["ArrowLeft"]=true;
document.getElementById('left').ontouchend = () => keys["ArrowLeft"]=false;
document.getElementById('right').ontouchstart = () => keys["ArrowRight"]=true;
document.getElementById('right').ontouchend = () => keys["ArrowRight"]=false;
document.getElementById('jump').ontouchstart = () => {
  if(player.onGround){ player.vy=-12; player.onGround=false; }
};

function rectCircle(r,c){
  return c.x+c.r>r.x && c.x-c.r<r.x+r.w &&
         c.y+c.r>r.y && c.y-c.r<r.y+r.h;
}

function update(){
  player.vx=0;
  if(keys["ArrowLeft"] || keys["a"]) player.vx=-5;
  if(keys["ArrowRight"] || keys["d"]) player.vx=5;
  if((keys["ArrowUp"] || keys["w"] || keys[" "]) && player.onGround){
    player.vy=-12; player.onGround=false;
  }

  player.vy+=gravity;
  player.x+=player.vx;
  player.y+=player.vy;
  player.onGround=false;

  if(rectCircle(ground,player)){
    player.y=ground.y-player.r;
    player.vy=0;
    player.onGround=true;
  }

  platforms.forEach(p=>{
    if(rectCircle(p,player) && player.vy>=0){
      player.y=p.y-player.r;
      player.vy=0;
      player.onGround=true;
    }
  });

  enemies.forEach(e=>{
    if(!e.alive) return;
    e.x+=e.dir*2;
    if(e.x<400||e.x>1400) e.dir*=-1;
0
    const dx=player.x-e.x;
    const dy=player.y-e.y;
    if(Math.hypot(dx,dy)<player.r+e.r){
      if(player.vy>0){
        e.alive=false;
        player.vy=-8;
        score+=100;
      } else {
        alert("💀 You got bonked!");
        location.reload();
      }
    }
  });

  coins.forEach(c=>{
    if(c.collected) return;
    if(Math.hypot(player.x-c.x, player.y-c.y)<player.r+10){
      c.collected=true;
      score+=10;
    }
  });

  if(player.x>flag.x){
    alert("🎉 YOU WIN 🪿 SCORE: "+score);
    location.reload();
  }

  cameraX = player.x - canvas.width/2;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(-cameraX,0);

  // Ground & Platforms
  ctx.fillStyle="green";
  ctx.fillRect(ground.x,ground.y,ground.w,ground.h);
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive) return;
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();
  });

  // Items
  coins.forEach(c=>{
    if(!c.collected){
      ctx.font="24px serif";
      ctx.fillText("🪙",c.x-10,c.y+10);
    }
  });

  // Flag
  ctx.fillStyle="white";
  ctx.fillRect(flag.x,flag.y,flag.w,flag.h);
  ctx.font="100px serif";
  ctx.fillText("🪿",flag.x-60,flag.y-20);

  // DRAW MARIO SPRITE
  const size = player.r * 2.5; // Slightly larger than hitbox for better look
  ctx.drawImage(marioImg, player.x - size/2, player.y - size/2, size, size);

  ctx.restore();

  ctx.fillStyle="black";
  ctx.font="24px sans-serif";
  ctx.fillText("Score: "+score,20,30);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
