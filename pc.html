<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dot Mario – PC</title>
<style>
body {
  margin: 0;
  background: skyblue;
  overflow: hidden;
}
#player {
  width: 20px;
  height: 20px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: 50px;
  left: 50px;
}
#ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: green;
}
</style>
</head>
<body>

<div id="player"></div>
<div id="ground"></div>

<script>
const player = document.getElementById("player");
let x = 50;
let y = 50;
let vy = 0;
let onGround = false;

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") x -= 10;
  if (e.key === "ArrowRight") x += 10;
  if (e.key === "ArrowUp" && onGround) {
    vy = 12;
    onGround = false;
  }
});

function loop() {
  vy -= 0.6;
  y += vy;

  if (y <= 50) {
    y = 50;
    vy = 0;
    onGround = true;
  }

  player.style.left = x + "px";
  player.style.bottom = y + "px";
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
